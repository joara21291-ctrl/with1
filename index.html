<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 모바일 성지 - 최신폰 최대 지원</title>
    <style>
        :root {
            --primary-blue: #007aff;
            --kakao-yellow: #fee500;
            --call-green: #2ecc71;
            --text-dark: #222;
            --bg-gray: #f8f9fa;
            --modal-bg: rgba(0, 0, 0, 0.5);
            --black-button: #111111;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: var(--text-dark);
            background-color: #fff;
        }

        section {
            padding: 50px 20px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            display: block;
            margin: 0 auto;
        }

        h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        /* 히어로 섹션 */
        .hero-section {
            padding: 0;
            position: relative;
            background-color: #f8f9fa;
            min-height: 50px; /* 섹션 최소 높이 추가 축소 */
        }
        .hero-img-box {
            width: 100%;
            overflow: hidden;
            background-color: #eee;
        }
        .hero-img-box img {
            border-radius: 0;
            width: 100%;
            /* 가로는 100% 유지, 세로는 기존 350px에서 더 줄인 200px 내외로 조정 (반절 수준) */
            height: 200px; 
            object-fit: cover; /* 가로를 채우면서 세로만 잘리도록 설정 */
            margin: 0 auto;
        }

        .main-headline {
            background: #000;
            color: #fff;
            padding: 60px 20px;
        }
        .main-headline h1 {
            font-size: 28px;
            margin: 0;
            line-height: 1.4;
            word-break: keep-all;
            font-weight: 700;
        }
        .highlight {
            color: var(--kakao-yellow);
        }

        /* 지점 안내 */
        .branch-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }
        .branch-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: left;
        }
        .branch-card img {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            border-radius: 0;
        }
        .branch-info {
            padding: 15px;
        }
        .branch-name {
            font-weight: 700;
            font-size: 16px;
            color: #333;
        }

        /* 상담 신청 폼 */
        .contact-section {
            background-color: #f1f3f5;
            padding: 60px 20px;
        }
        .contact-container {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: left;
            max-width: 500px;
            margin: 0 auto;
            box-sizing: border-box;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 15px;
        }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            font-family: inherit;
        }
        .form-row {
            display: flex;
            gap: 10px;
        }
        .radio-group {
            display: flex;
            gap: 15px;
            margin-top: 5px;
            flex-wrap: wrap;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .submit-btn {
            width: 100%;
            padding: 18px;
            background-color: var(--primary-blue);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .submit-btn:hover { background-color: #0056b3; }

        .fixed-bottom {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            display: flex;
            z-index: 1000;
            background: #fff;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
        }
        .btn {
            flex: 1; padding: 20px 0; border: none;
            text-decoration: none; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; background-color: var(--black-button); color: #fff;
        }
        .btn:first-child { border-right: 1px solid #333; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-bg);
            display: none; align-items: center; justify-content: center;
            z-index: 2000; padding: 20px;
        }
        .modal-content {
            background: #fff; width: 100%; max-width: 400px;
            border-radius: 24px; padding: 40px 24px 30px;
            text-align: center; position: relative;
        }

        @media (max-width: 600px) {
            .branch-grid { grid-template-columns: 1fr; }
            .form-row { flex-direction: column; }
        }
    </style>
</head>
<body>

    <!-- 최상단 매장 사진 (가로는 꽉 차게, 세로는 더 슬림하게 조정) -->
    <section class="hero-section">
        <div class="hero-img-box">
            <img id="main-photo" src="photo.jpeg" alt="매장 메인 전경" 
                 onerror="handleImageError(this)">
        </div>
    </section>

    <section class="main-headline">
        <h1>전주 휴대폰 성지, <span class="highlight">최대 지원금</span> 약속!<br>가장 저렴하게 바꾸는 법</h1>
        <p style="margin-top:15px; opacity:0.8;">방문 전 예약 시 추가 사은품을 증정해 드립니다.</p>
    </section>

    <section class="price-section">
        <h2>🔥 오늘의 실시간 특가표 🔥</h2>
        <div style="background: #fff; padding: 10px; border-radius: 12px; border: 1px solid #ddd;">
            <img src="index.html%EC%8A%A4%ED%8C%A9%ED%91%9C.jpg" alt="실시간 가격표" 
                 onerror="this.src='https://via.placeholder.com/800x800?text=스팩표+이미지+파일명+확인필요'">
        </div>
    </section>

    <section class="branch-section">
        <h2>📍 우리 동네 매장 안내</h2>
        <div class="branch-grid">
            <div class="branch-card">
                <img src="image_bb41d5.jpg" alt="반월점" onerror="this.src='https://via.placeholder.com/400x300?text=Store'">
                <div class="branch-info"><div class="branch-name">📍 전주 반월점</div></div>
            </div>
            <div class="branch-card">
                <img src="store_2.jpg.jpg" alt="만성점" onerror="this.src='https://via.placeholder.com/400x300?text=Store'">
                <div class="branch-info"><div class="branch-name">📍 전주 만성점</div></div>
            </div>
            <div class="branch-card">
                <img src="image_bb4579.png" alt="서신점" onerror="this.src='https://via.placeholder.com/400x300?text=Store'">
                <div class="branch-info"><div class="branch-name">📍 전주 서신점</div></div>
            </div>
        </div>
    </section>

    <section class="contact-section" id="contact">
        <h2>📩 간편 상담 신청</h2>
        <div class="contact-container">
            <form id="inquiryForm">
                <div class="form-row">
                    <div class="form-group" style="flex: 1;">
                        <label for="name">성함</label>
                        <input type="text" id="name" class="form-control" placeholder="성함 입력" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="phone">연락처</label>
                        <input type="tel" id="phone" class="form-control" placeholder="010-0000-0000" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>통신사 및 신청구분</label>
                    <div class="radio-group">
                        <label class="radio-item"><input type="radio" name="carrier" value="SKT"> SKT</label>
                        <label class="radio-item"><input type="radio" name="carrier" value="KT"> KT</label>
                        <label class="radio-item"><input type="radio" name="carrier" value="LG"> LG</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="model">희망 기종</label>
                    <textarea id="model" class="form-control" rows="2" placeholder="예: 갤럭시 S24, 아이폰 15 등"></textarea>
                </div>
                <button type="button" id="submitButton" class="submit-btn" onclick="submitForm()">최저가 상담 신청하기</button>
            </form>
        </div>
    </section>

    <div style="height: 100px;"></div>

    <div class="fixed-bottom">
        <a href="https://open.kakao.com/o/sdWqcMOg" class="btn" target="_blank">카톡 상담하기</a>
        <button class="btn" onclick="openModal()">전화 문의하기</button>
    </div>

    <div id="callModal" class="modal-overlay">
        <div class="modal-content">
            <button style="position:absolute; top:15px; right:15px; border:none; background:none; font-size:24px; cursor:pointer;" onclick="closeModal()">×</button>
            <div style="font-size: 20px; font-weight: 700; margin-bottom: 15px;">안내 드립니다</div>
            <p style="color:#666; font-size:15px; margin-bottom:25px;">현재 상담량이 많아 전화 연결이 늦어질 수 있습니다.<br>카톡으로 문의주시면 가장 빠르게 혜택 안내를 도와드립니다!</p>
            <div style="display: flex; gap: 10px;">
                <button style="flex:1; padding:15px; border-radius:12px; border:1px solid #ddd; background:#fff;" onclick="closeModal()">나중에 하기</button>
                <a href="https://open.kakao.com/o/sdWqcMOg" style="flex:1; padding:15px; border-radius:12px; background:var(--primary-blue); color:#fff; text-decoration:none; font-weight:600;" target="_blank">카톡으로 받기</a>
            </div>
        </div>
    </div>

    <script>
        function handleImageError(image) {
            const fallbackSources = [
                'photo.jpg',
                'PHOTO.JPEG',
                'PHOTO.JPG',
                'photo.png'
            ];
            
            if (!image.dataset.errorCount) image.dataset.errorCount = 0;
            let count = parseInt(image.dataset.errorCount);
            
            if (count < fallbackSources.length) {
                const nextSrc = fallbackSources[count];
                image.dataset.errorCount = count + 1;
                image.src = nextSrc;
            } else {
                image.onerror = null;
                image.src = 'https://via.placeholder.com/800x200?text=photo.jpeg+이미지를+찾을+수+없음';
            }
        }

        function openModal() { document.getElementById('callModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('callModal').style.display = 'none'; }

        async function submitForm() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const carrier = document.querySelector('input[name="carrier"]:checked')?.value || '미선택';
            const model = document.getElementById('model').value;

            if(!name || !phone) {
                alert('성함과 연락처를 입력해주세요.');
                return;
            }

            const btn = document.getElementById('submitButton');
            btn.disabled = true;
            btn.innerText = '전송 중...';

            const t1 = "8755445624";
            const t2 = "AAGWb-AkPRIjsxbIzc8k6W6oBr9zjYTrNVo";
            const fullToken = `${t1}:${t2}`;
            const chatId = "8682551663";

            const text = `🎯 [랜딩페이지 상담 신청]\n\n성함: ${name}\n연락처: ${phone}\n통신사: ${carrier}\n문의내용: ${model}`;

            try {
                const res = await fetch(`https://api.telegram.org/bot${fullToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: text })
                });

                if(res.ok) {
                    alert(name + '님, 신청이 완료되었습니다. 담당자가 곧 연락드리겠습니다!');
                    document.getElementById('inquiryForm').reset();
                } else {
                    alert('전송 오류가 발생했습니다. 카카오톡으로 문의해주세요.');
                }
            } catch(e) {
                alert('네트워크 오류가 발생했습니다.');
            } finally {
                btn.disabled = false;
                btn.innerText = '최저가 상담 신청하기';
            }
        }
    </script>
</body>
</html>
